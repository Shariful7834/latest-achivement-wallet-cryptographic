# Moodle 4.5 + MariaDB for Open Badges 3.0 testing
# Usage: docker compose up -d
# Moodle UI: http://localhost:8080
# First run: go to http://localhost:8080 to trigger install

services:
  db:
    image: mariadb:10.11
    container_name: moodle-db
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_bin
      --innodb_file_per_table=On
      --wait-timeout=28800
      --skip-log-bin
    environment:
      MYSQL_ROOT_PASSWORD: "m@0dl3ing"
      MYSQL_USER: moodle
      MYSQL_PASSWORD: "m@0dl3ing"
      MYSQL_DATABASE: moodle
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  webserver:
    image: moodlehq/moodle-php-apache:8.3
    container_name: moodle-app
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - ./moodle:/var/www/html
    environment:
      MOODLE_DOCKER_RUNNING: 1
      MOODLE_DOCKER_DBTYPE: mariadb
      MOODLE_DOCKER_DBNAME: moodle
      MOODLE_DOCKER_DBUSER: moodle
      MOODLE_DOCKER_DBPASS: "m@0dl3ing"
      MOODLE_DOCKER_DBHOST: db
      MOODLE_DOCKER_DBCOLLATION: utf8mb4_bin
      MOODLE_DOCKER_WEB_HOST: localhost
      MOODLE_DOCKER_WEB_PORT: 8080
    restart: unless-stopped

volumes:
  db_data:

